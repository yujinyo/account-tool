<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号管理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 26px; margin-bottom: 8px; }
        .header p { opacity: 0.85; font-size: 14px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            transition: all 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }

        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .msg.error { background: #fee; color: #c00; border: 1px solid #fcc; display: block; }
        .msg.success { background: #efe; color: #060; border: 1px solid #cfc; display: block; }

        .hint { text-align: center; margin-top: 16px; font-size: 13px; color: #999; line-height: 1.6; }

        /* 账号列表页 */
        .main-page { display: none; }
        .main-page.active { display: block; }
        .top-bar {
            background: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
            margin-bottom: 20px;
        }
        .top-bar .user { font-size: 14px; color: #333; }
        .top-bar .user strong { color: #667eea; }
        .logout-btn {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .num { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-box .label { font-size: 12px; color: #999; margin-top: 4px; }
        .add-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: white;
            border: 2px dashed #ccc;
            border-radius: 12px;
            text-align: center;
            color: #999;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .add-btn:hover { border-color: #667eea; color: #667eea; }
        .account-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .account-item:hover { border-color: #667eea; }
        .account-item .name { font-weight: 600; color: #333; margin-bottom: 4px; }
        .account-item .time { font-size: 12px; color: #999; }
        .empty { text-align: center; color: #ccc; padding: 60px 0; font-size: 15px; line-height: 2; }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 20px; color: #333; }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            outline: none;
            min-height: 120px;
        }
        textarea:focus { border-color: #667eea; }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-btns .btn { flex: 1; }
        .modal-btns .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }
    </style>
</head>
<body>

<!-- 登录注册页 -->
<div class="container" id="authPage">
    <div class="header">
        <h1>🔐 账号管理</h1>
        <p>安全存储 · 一键复制</p>
    </div>
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPw" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <div class="msg" id="loginMsg"></div>
            <button class="btn" onclick="doLogin()">登 录</button>
            <div class="hint">登录后数据云端同步</div>
        </div>

        <div id="regForm" style="display:none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUser" placeholder="4-20位字符" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPw" placeholder="至少6位" autocomplete="new-password">
            </div>
            <div class="msg" id="regMsg"></div>
            <button class="btn" onclick="doRegister()">注 册</button>
            <div class="hint">密码至少6位，请妥善保管</div>
        </div>
    </div>
</div>

<!-- 主页面（登录后显示） -->
<div class="main-page" id="mainPage">
    <div class="top-bar">
        <div class="user">👤 <strong id="currentUser"></strong></div>
        <button class="logout-btn" onclick="logout()">退出</button>
    </div>

    <div style="padding: 0 20px;">
        <div class="stats">
            <div class="stat-box">
                <div class="num" id="totalCount">0</div>
                <div class="label">账号总数</div>
            </div>
            <div class="stat-box">
                <div class="num" id="groupCount">0</div>
                <div class="label">分组数</div>
            </div>
        </div>

        <div class="add-btn" onclick="showAdd()">＋ 添加分组</div>
        <div id="accountList"></div>
    </div>
</div>

<!-- 添加分组弹窗 -->
<div class="modal" id="addModal">
    <div class="modal-box">
        <h3>添加分组</h3>
        <div class="form-group">
            <label>分组名称</label>
            <input type="text" id="groupName" placeholder="如：抖音账号、微信等">
        </div>
        <div class="form-group">
            <label>账号信息（每行一条）</label>
            <textarea id="accountsText" placeholder="每行一条账号信息&#10;格式：账号----密码----邮箱"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn btn-cancel" onclick="closeAdd()">取消</button>
            <button class="btn" onclick="addGroup()">确认添加</button>
        </div>
    </div>
</div>

<script>
// ============ 配置 ============
const API_URL = 'https://account-tool-vgp3-7i62lav3v-yujinyos-projects.vercel.app';
const JSONBIN_KEY = '$2a$10$YcuC/l.PRLR9qXlvVmWae.HGMwNkhgxNDx/FNotNyyIip.ujfyujS';

// ============ 状态 ============
let currentUser = localStorage.getItem('username') || '';
let currentPassword = localStorage.getItem('password') || '';

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', () => {
    if (currentUser && currentPassword) {
        showMain();
        loadAccounts();
    }
    document.getElementById('loginPw').addEventListener('keypress', e => {
        if (e.key === 'Enter') doLogin();
    });
});

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('regForm').style.display = tab === 'register' ? 'block' : 'none';
    hideMsg();
}

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
    setTimeout(() => el.className = 'msg', 3000);
}
function hideMsg() {
    document.getElementById('loginMsg').className = 'msg';
    document.getElementById('regMsg').className = 'msg';
}

// ============ 注册 ============
async function doRegister() {
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPw').value;
    if (!username || username.length < 4) return showMsg('regMsg', '用户名至少4位', 'error');
    if (password.length < 6) return showMsg('regMsg', '密码至少6位', 'error');

    try {
        const res = await fetch(`${API_URL}/api/user/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('username', username);
            localStorage.setItem('password', password);
            currentUser = username;
            currentPassword = password;
            showMsg('regMsg', '注册成功！', 'success');
            setTimeout(() => { showMain(); loadAccounts(); }, 800);
        } else {
            showMsg('regMsg', data.error || '注册失败', 'error');
        }
    } catch (e) {
        showMsg('regMsg', '网络错误', 'error');
    }
}

// ============ 登录 ============
async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPw').value;
    if (!username || !password) return showMsg('loginMsg', '请输入用户名和密码', 'error');

    try {
        const res = await fetch(`${API_URL}/api/user/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('username', username);
            localStorage.setItem('password', password);
            currentUser = username;
            currentPassword = password;
            showMain();
            loadAccounts();
        } else {
            showMsg('loginMsg', data.error || '登录失败', 'error');
        }
    } catch (e) {
        showMsg('loginMsg', '网络错误', 'error');
    }
}

function logout() {
    localStorage.removeItem('username');
    localStorage.removeItem('password');
    currentUser = '';
    currentPassword = '';
    document.getElementById('authPage').style.display = 'flex';
    document.getElementById('mainPage').classList.remove('active');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPw').value = '';
}

// ============ 主页面 ============
function showMain() {
    document.getElementById('authPage').style.display = 'none';
    document.getElementById('mainPage').classList.add('active');
    document.getElementById('currentUser').textContent = currentUser;
}

async function loadAccounts() {
    try {
        const res = await fetch(`${API_URL}/api/user/records`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, password: currentPassword })
        });
        const data = await res.json();
        if (res.ok) {
            renderList(data.records || []);
        }
    } catch (e) { console.error(e); }
}

function renderList(records) {
    document.getElementById('totalCount').textContent =
        records.reduce((s, r) => s + (r.accounts?.length || 0), 0);
    document.getElementById('groupCount').textContent = records.length;

    const container = document.getElementById('accountList');
    if (records.length === 0) {
        container.innerHTML = '<div class="empty">暂无数据<br>点击上方「＋ 添加分组」开始</div>';
        return;
    }
    container.innerHTML = records.map((r, i) => `
        <div class="account-item" onclick="toggleGroup(${i})">
            <div class="name">▶ ${r.groupName}</div>
            <div class="time">${r.accounts.length} 条 · ${new Date(r.updatedAt).toLocaleString('zh-CN')}</div>
            <div id="g${i}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
                ${r.accounts.map(a => `
                    <div style="padding:8px 0;cursor:pointer;" onclick="copyText('${a.replace(/'/g, "\\'")}')">
                        ${a}
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function toggleGroup(i) {
    const el = document.getElementById(`g${i}`);
    const item = el.parentElement;
    const nameEl = item.querySelector('.name');
    if (el.style.display === 'none') {
        el.style.display = 'block';
        nameEl.textContent = '▼ ' + nameEl.textContent.slice(2);
    } else {
        el.style.display = 'none';
        nameEl.textContent = '▶ ' + nameEl.textContent.slice(2);
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        // 简单提示
        const toast = document.createElement('div');
        toast.textContent = '已复制';
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:9999;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    });
}

// ============ 添加分组 ============
function showAdd() {
    document.getElementById('addModal').classList.add('show');
    document.getElementById('groupName').value = '';
    document.getElementById('accountsText').value = '';
}
function closeAdd() {
    document.getElementById('addModal').classList.remove('show');
}

async function addGroup() {
    const groupName = document.getElementById('groupName').value.trim();
    const text = document.getElementById('accountsText').value.trim();
    if (!groupName) return alert('请输入分组名称');
    if (!text) return alert('请输入账号信息');
    const accounts = text.split('\n').map(s => s.trim()).filter(Boolean);
    if (accounts.length === 0) return alert('请输入至少一条账号信息');

    try {
        const res = await fetch(`${API_URL}/api/user/records`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, password: currentPassword, groupName, accounts })
        });
        const data = await res.json();
        if (res.ok) {
            closeAdd();
            loadAccounts();
        } else {
            alert(data.error || '添加失败');
        }
    } catch (e) {
        alert('网络错误');
    }
}

// 点击弹窗背景关闭
document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeAdd();
});
</script>
</body>
</html>

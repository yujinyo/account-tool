<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号分离一键复制工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 40px 50px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      color: #222;
      margin-bottom: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    h1 .icon {
      margin-right: 8px;
    }

    /* 文本输入区 */
    .textarea-wrap {
      position: relative;
      margin-bottom: 30px;
    }

    textarea#rawInput {
      width: 100%;
      min-height: 150px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      font-family: "Courier New", monospace;
      color: #444;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.8;
    }

    textarea#rawInput:focus {
      border-color: #4caf50;
    }

    .parse-btn-wrap {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-parse {
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-parse:hover {
      background: #43a047;
    }

    .btn-clear {
      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-clear:hover {
      background: #e8e8e8;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin-left: 4px;
    }

    /* 分隔符设置 */
    .sep-setting {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .sep-setting label {
      font-size: 13px;
      color: #666;
    }

    .sep-setting input {
      border: 1px solid #d9d9d9;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 13px;
      width: 120px;
      outline: none;
    }

    .sep-setting input:focus {
      border-color: #4caf50;
    }

    /* 表格区域 */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: #f7f7f7;
    }

    thead th {
      text-align: left;
      padding: 13px 16px;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #ececec;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: #f9fdf9;
    }

    tbody td {
      padding: 14px 16px;
      color: #444;
      vertical-align: middle;
    }

    td.num {
      color: #4caf50;
      font-weight: 700;
      font-size: 16px;
      width: 50px;
    }

    td.account-cell {
      min-width: 200px;
    }

    td.password-cell {
      min-width: 140px;
    }

    td.email-cell {
      min-width: 200px;
    }

    td.action-cell {
      min-width: 100px;
      text-align: right;
    }

    .cell-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cell-value {
      flex: 1;
      word-break: break-all;
    }

    .masked {
      letter-spacing: 2px;
      color: #999;
    }

    /* 小复制按钮 */
    .btn-copy-small {
      background: #fff;
      color: #4caf50;
      border: 1.5px solid #4caf50;
      border-radius: 5px;
      padding: 3px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-weight: 500;
    }

    .btn-copy-small:hover {
      background: #4caf50;
      color: #fff;
    }

    .btn-copy-small.copied {
      background: #4caf50;
      color: #fff;
      border-color: #4caf50;
    }

    /* 全复制按钮 */
    .btn-copy-all {
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-copy-all:hover {
      background: #43a047;
    }

    .btn-copy-all.copied {
      background: #388e3c;
    }

    /* 显示/隐藏密码 */
    .toggle-pw {
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      user-select: none;
    }

    .toggle-pw:hover {
      color: #4caf50;
    }

    /* 空状态 */
    .empty-tip {
      text-align: center;
      color: #bbb;
      padding: 40px 0 20px;
      font-size: 15px;
    }

    /* toast 提示 */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: rgba(60,60,60,0.88);
      color: #fff;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 数据共享说明 */
    .share-info {
      margin-top: 28px;
      padding: 14px 18px;
      background: #f0faf0;
      border-radius: 8px;
      border-left: 4px solid #4caf50;
      font-size: 13px;
      color: #555;
    }

    .share-info strong {
      color: #2e7d32;
    }

    /* 统计栏 */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .stats-bar span {
      font-size: 13px;
      color: #888;
    }

    .btn-show-all-pw {
      font-size: 12px;
      color: #4caf50;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }

    .btn-show-all-pw:hover {
      color: #2e7d32;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 12px 30px;
      }
      h1 { font-size: 20px; }
      thead th, tbody td { padding: 10px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🔐</span>账号分离一键复制工具</h1>

    <!-- 分隔符设置 -->
    <div class="sep-setting">
      <label>分隔符（支持多个，用竖线隔开）：</label>
      <input id="sepInput" value="----" placeholder="如 ---- 或 ---- | --- | :" />
      <span class="hint">格式：账号[分隔符]密码[分隔符]邮箱</span>
    </div>

    <!-- 原始输入框 -->
    <div class="textarea-wrap">
      <textarea id="rawInput" placeholder="请粘贴账号数据，每行一条，格式如：&#10;i3mk1f7@llt.lingeringp.com----1FLZzqyJRu----bs0gub8cu3@126.com&#10;kskg4h3@llt.lingeringp.com----aPI3MWOlkq----jfp983xiz0@126.com"></textarea>
      <div class="parse-btn-wrap">
        <button class="btn-parse" onclick="parseData()">解析数据</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
        <span class="hint">解析后数据将自动保存，刷新页面后依然存在</span>
      </div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar">
      <span id="statsText">共 0 条账号</span>
      <button class="btn-show-all-pw" onclick="toggleAllPasswords()">显示/隐藏所有密码</button>
    </div>

    <!-- 表格 -->
    <div class="table-wrap">
      <table id="accountTable">
        <thead>
          <tr>
            <th>序号</th>
            <th>账号</th>
            <th>密码</th>
            <th>邮箱</th>
            <th style="text-align:right">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="5" class="empty-tip">暂无数据，请在上方粘贴账号信息并点击「解析数据」</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 共享说明 -->
    <div class="share-info">
      💡 <strong>数据共享说明：</strong>数据保存在浏览器本地存储（localStorage）中，同一设备/浏览器刷新后可保留数据。如需多人共享，请将本 HTML 文件部署到服务器，或直接将解析后的数据通过文本框内容复制分享给他人。
    </div>
  </div>

  <div id="toast">已复制！</div>

  <script>
    // ─── 全局状态 ───────────────────────────────────────────────
    let accounts = [];          // [{account, password, email}]
    let showPasswords = {};     // 记录每行密码是否显示
    let allPwVisible = false;

    // ─── 初始化：从 localStorage 恢复数据 ────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('account_tool_data');
      if (saved) {
        try {
          accounts = JSON.parse(saved);
          const savedRaw = localStorage.getItem('account_tool_raw');
          if (savedRaw) document.getElementById('rawInput').value = savedRaw;
          renderTable();
        } catch(e) {}
      }
    });

    // ─── 解析数据 ────────────────────────────────────────────────
    function parseData() {
      const raw = document.getElementById('rawInput').value.trim();
      if (!raw) {
        showToast('请先输入账号数据');
        return;
      }

      const sepRaw = document.getElementById('sepInput').value || '----';
      // 支持多个分隔符（用 | 分隔）
      const seps = sepRaw.split('|').map(s => s.trim()).filter(Boolean);

      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const parsed = [];

      for (const line of lines) {
        let parts = null;
        for (const sep of seps) {
          if (line.includes(sep)) {
            const idx1 = line.indexOf(sep);
            const rest = line.substring(idx1 + sep.length);
            const idx2 = rest.indexOf(sep);
            if (idx2 !== -1) {
              parts = [
                line.substring(0, idx1).trim(),
                rest.substring(0, idx2).trim(),
                rest.substring(idx2 + sep.length).trim()
              ];
            } else {
              // 只有两段
              parts = [
                line.substring(0, idx1).trim(),
                rest.trim(),
                ''
              ];
            }
            break;
          }
        }
        if (parts) {
          parsed.push({ account: parts[0], password: parts[1], email: parts[2] });
        } else {
          // 尝试常见分隔符自动识别
          const auto = autoSplit(line);
          if (auto) parsed.push(auto);
        }
      }

      if (parsed.length === 0) {
        showToast('未能识别任何有效账号，请检查分隔符设置');
        return;
      }

      accounts = parsed;
      showPasswords = {};
      saveToLocal();
      renderTable();
      showToast(`成功解析 ${parsed.length} 条账号`);
    }

    function autoSplit(line) {
      const delimiters = ['----', '---', '--', '|', ':', '\t', '  '];
      for (const d of delimiters) {
        if (line.includes(d)) {
          const parts = line.split(d).map(s => s.trim());
          if (parts.length >= 2) {
            return {
              account: parts[0],
              password: parts[1],
              email: parts[2] || ''
            };
          }
        }
      }
      return null;
    }

    // ─── 渲染表格 ────────────────────────────────────────────────
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      document.getElementById('statsText').textContent = `共 ${accounts.length} 条账号`;

      if (accounts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-tip">暂无数据，请在上方粘贴账号信息并点击「解析数据」</td></tr>`;
        return;
      }

      tbody.innerHTML = accounts.map((item, i) => {
        const visible = showPasswords[i] || allPwVisible;
        const pwDisplay = visible ? escHtml(item.password) : maskPassword(item.password);
        const eyeIcon = visible ? '🙈' : '👁';

        return `
          <tr>
            <td class="num">${i + 1}</td>
            <td class="account-cell">
              <div class="cell-inner">
                <span class="cell-value">${escHtml(item.account)}</span>
                <button class="btn-copy-small" onclick="copyText('${escAttr(item.account)}', this)">复制</button>
              </div>
            </td>
            <td class="password-cell">
              <div class="cell-inner">
                <span class="cell-value ${visible ? '' : 'masked'}" id="pw-${i}">${pwDisplay}</span>
                <span class="toggle-pw" onclick="togglePassword(${i})" title="显示/隐藏密码">${eyeIcon}</span>
                <button class="btn-copy-small" onclick="copyText('${escAttr(item.password)}', this)">复制</button>
              </div>
            </td>
            <td class="email-cell">
              <div class="cell-inner">
                <span class="cell-value">${escHtml(item.email)}</span>
                ${item.email ? `<button class="btn-copy-small" onclick="copyText('${escAttr(item.email)}', this)">复制</button>` : ''}
              </div>
            </td>
            <td class="action-cell">
              <button class="btn-copy-all" onclick="copyAll(${i}, this)">全复制</button>
            </td>
          </tr>`;
      }).join('');
    }

    function maskPassword(pw) {
      if (!pw) return '';
      return '••••••••••';
    }

    function togglePassword(idx) {
      showPasswords[idx] = !showPasswords[idx];
      renderTable();
    }

    function toggleAllPasswords() {
      allPwVisible = !allPwVisible;
      showPasswords = {};
      renderTable();
    }

    // ─── 复制功能 ────────────────────────────────────────────────
    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制: ' + (text.length > 30 ? text.substring(0, 30) + '…' : text));
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove('copied');
          }, 1500);
        }
      }).catch(() => {
        // 降级方案
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制！');
      });
    }

    function copyAll(idx, btn) {
      const item = accounts[idx];
      const fullText = [item.account, item.password, item.email].filter(Boolean).join('----');
      copyText(fullText, null);
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '已复制✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 1500);
      }
    }

    // ─── 清空 ───────────────────────────────────────────────────
    function clearAll() {
      if (accounts.length === 0 && !document.getElementById('rawInput').value) {
        showToast('已经是空的了');
        return;
      }
      if (!confirm('确定要清空所有数据吗？')) return;
      accounts = [];
      showPasswords = {};
      document.getElementById('rawInput').value = '';
      localStorage.removeItem('account_tool_data');
      localStorage.removeItem('account_tool_raw');
      renderTable();
      showToast('已清空');
    }

    // ─── 本地存储 ────────────────────────────────────────────────
    function saveToLocal() {
      localStorage.setItem('account_tool_data', JSON.stringify(accounts));
      localStorage.setItem('account_tool_raw', document.getElementById('rawInput').value);
    }

    // ─── 工具函数 ────────────────────────────────────────────────
    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escAttr(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/\\/g, '\\\\');
    }

    // ─── Toast 提示 ──────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>

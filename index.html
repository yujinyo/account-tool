<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>账号分离一键复制工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 0;
    }

    /* 移动端顶部留白 */
    body { padding-top: env(safe-area-inset-top); }

    .container {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }

    /* ─── 标题区 ─────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      padding: 28px 20px 24px;
      text-align: center;
    }

    .header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ─── 已使用标记样式 ─────────────────────── */
    .account-card.used {
      background: #f8f8f8;
      border-color: #d0d0d0;
      opacity: 0.85;
    }

    .account-card.used .card-num {
      background: #aaa;
    }

    .account-card.used .card-num::after {
      content: ' ✓';
    }

    .used-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #e0e0e0;
      color: #888;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: auto;
    }

    .used-badge.active {
      background: #4caf50;
      color: #fff;
    }

    .used-badge.active::before {
      content: '✓ ';
    }

    /* ─── 分享横幅 ─────────────────────────── */
    .share-banner {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 12px;
      padding: 20px 18px;
      margin: 16px 16px 0;
      display: none;
    }
    .share-banner.active { display: block; }
    .share-banner h3 { font-size: 15px; margin-bottom: 4px; }
    .share-banner p { font-size: 12px; opacity: 0.85; margin-bottom: 12px; line-height: 1.5; }
    .share-banner input {
      width: 100%; padding: 10px 12px; border: none; border-radius: 8px;
      font-size: 12px; color: #333; background: rgba(255,255,255,0.97);
      margin-bottom: 10px;
    }
    .share-banner button {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: #fff; color: #667eea; font-weight: 700;
      font-size: 14px; cursor: pointer;
    }

    /* 分享成功 */
    .share-success {
      background: #d4edda; border: 1px solid #c3e6cb; color: #155724;
      border-radius: 10px; padding: 14px 16px; font-size: 13px;
      margin: 12px 16px 0; display: none; align-items: center; gap: 10px;
    }
    .share-success.active { display: flex; flex-wrap: wrap; }
    .share-success input {
      flex: 1; min-width: 0; padding: 7px 10px; border: 1px solid #b8dac5;
      border-radius: 6px; font-size: 12px; background: #fff; color: #333;
    }
    .share-success button {
      background: #4caf50; color: #fff; border: none; border-radius: 6px;
      padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* 查看模式横幅 */
    .view-mode-banner {
      background: #fff3cd; border: 1px solid #ffeeba; color: #856404;
      border-radius: 10px; padding: 12px 16px; font-size: 13px;
      margin: 12px 16px 0; display: none;
    }
    .view-mode-banner.active { display: block; }

    /* ─── 输入区 ────────────────────────────── */
    .input-section { padding: 16px 16px 0; }

    .sep-setting {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .sep-setting label { font-size: 13px; color: #666; white-space: nowrap; }
    .sep-setting input {
      border: 1px solid #d9d9d9; border-radius: 6px; padding: 7px 10px;
      font-size: 13px; width: 110px; outline: none; flex: 1; max-width: 180px;
    }
    .sep-setting input:focus { border-color: #4caf50; }
    .sep-setting .hint { font-size: 11px; color: #aaa; width: 100%; margin-top: -2px; }

    textarea#rawInput {
      width: 100%; min-height: 120px; border: 1px solid #d9d9d9;
      border-radius: 10px; padding: 12px 14px; font-size: 14px;
      font-family: "Courier New", monospace; color: #444;
      resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.7;
    }
    textarea#rawInput:focus { border-color: #4caf50; }

    .parse-btn-wrap {
      margin-top: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }

    .btn-parse {
      background: #4caf50; color: #fff; border: none; border-radius: 8px;
      padding: 11px 20px; font-size: 15px; cursor: pointer; font-weight: 600;
      transition: background 0.2s; flex: 1; min-width: 100px;
    }
    .btn-parse:hover { background: #43a047; }

    .btn-share {
      background: #667eea; color: #fff; border: none; border-radius: 8px;
      padding: 11px 16px; font-size: 15px; cursor: pointer; font-weight: 600;
      transition: background 0.2s; display: none; flex: 1; min-width: 100px;
    }
    .btn-share.active { display: block; }
    .btn-share:hover { background: #5a6fd6; }

    .btn-clear {
      background: #f5f5f5; color: #666; border: 1px solid #ddd; border-radius: 8px;
      padding: 11px 16px; font-size: 15px; cursor: pointer; transition: background 0.2s;
    }
    .btn-clear:hover { background: #e8e8e8; }

    /* ─── 账号列表区 ────────────────────────── */
    .accounts-section { padding: 16px 16px 24px; }

    .stats-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding: 0 2px; flex-wrap: wrap; gap: 6px;
    }
    .stats-bar span { font-size: 13px; color: #888; }
    .stats-right {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .used-count {
      font-size: 12px; color: #aaa; background: #f0f0f0;
      padding: 3px 10px; border-radius: 12px;
    }
    .used-count.has-used { color: #fff; background: #4caf50; }
    .btn-show-all-pw {
      font-size: 13px; color: #4caf50; cursor: pointer; background: none;
      border: none; text-decoration: underline; padding: 4px;
    }
    .btn-show-all-pw:hover { color: #2e7d32; }
    .btn-reset-used {
      font-size: 12px; color: #999; cursor: pointer; background: none;
      border: 1px solid #ddd; border-radius: 12px; padding: 3px 10px;
      transition: all 0.2s;
    }
    .btn-reset-used:hover { color: #f44336; border-color: #f44336; background: #fff0f0; }

    /* ─── 账号卡片（移动端主布局） ─────────── */
    .account-card {
      background: #fff; border: 2px solid #eee; border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      background: #4caf50; color: #fff; font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }

    .card-row {
      display: flex; align-items: flex-start;
      margin-bottom: 10px; gap: 8px;
    }
    .card-row:last-child { margin-bottom: 0; }

    .card-label {
      font-size: 12px; color: #aaa; min-width: 40px;
      padding-top: 2px; font-weight: 500; flex-shrink: 0;
    }

    .card-value-wrap {
      flex: 1; display: flex; align-items: center; gap: 8px;
      min-width: 0; flex-wrap: wrap;
    }

    .card-value {
      flex: 1; font-size: 14px; color: #333;
      word-break: break-all; line-height: 1.5; min-width: 0;
      overflow-wrap: break-word;
    }

    .card-value.masked {
      letter-spacing: 3px; color: #bbb; font-size: 16px;
    }

    /* 已使用时卡片变灰+划线 */
    .account-card.used .card-value { color: #999; text-decoration: line-through; text-decoration-color: #ccc; }
    .account-card.used .card-value.masked { text-decoration: none; }
    .account-card.used .card-label { color: #bbb; }
    .account-card.used .btn-copy-all { background: #aaa; }
    .account-card.used .btn-copy-all:hover { background: #999; }

    .btn-copy {
      background: #f0f9f0; color: #4caf50; border: 1.5px solid #4caf50;
      border-radius: 8px; padding: 5px 14px; font-size: 13px;
      cursor: pointer; white-space: nowrap; font-weight: 600;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-copy:hover { background: #4caf50; color: #fff; }
    .btn-copy.copied { background: #4caf50; color: #fff; }

    .btn-copy-all {
      background: #4caf50; color: #fff; border: none; border-radius: 8px;
      padding: 10px; font-size: 15px; cursor: pointer; font-weight: 700;
      transition: background 0.15s; width: 100%; margin-top: 12px;
    }
    .btn-copy-all:hover { background: #43a047; }
    .btn-copy-all.copied { background: #388e3c; }

    /* 眼睛切换 */
    .toggle-pw {
      cursor: pointer; font-size: 16px; flex-shrink: 0;
      user-select: none; padding: 2px;
    }

    /* 空状态 */
    .empty-tip {
      text-align: center; color: #ccc; padding: 50px 0;
      font-size: 15px; line-height: 1.8;
    }

    /* 说明 */
    .share-info {
      margin: 0 16px 20px; padding: 12px 14px;
      background: #f0faf0; border-radius: 10px;
      border-left: 3px solid #4caf50; font-size: 12px;
      color: #555; line-height: 1.6;
    }
    .share-info strong { color: #2e7d32; }

    /* toast */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(60,60,60,0.9); color: #fff; padding: 12px 28px;
      border-radius: 30px; font-size: 14px; pointer-events: none;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 9999;
      text-align: center; max-width: 90vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── 桌面端大屏：保留表格布局 ─────────── */
    @media (min-width: 768px) {
      body { padding: 40px 20px; }
      .container { border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); min-height: auto; }
      .header { border-radius: 16px 16px 0 0; }

      .share-banner { margin: 20px 24px 0; }
      .share-success { margin: 12px 24px 0; }
      .view-mode-banner { margin: 16px 24px 0; }
      .input-section { padding: 16px 24px 0; }
      .accounts-section { padding: 16px 24px 24px; }
      .share-info { margin: 0 24px 24px; }

      .header h1 { font-size: 26px; }

      /* 桌面端用表格 */
      .account-card { display: none; }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      thead tr { background: #f7f7f7; }
      thead th {
        text-align: left; padding: 13px 16px; font-weight: 600; color: #333;
        border-bottom: 2px solid #ececec; white-space: nowrap;
      }
      tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
      tbody tr:hover { background: #f9fdf9; }
      tbody td { padding: 14px 16px; color: #444; vertical-align: middle; }
      td.num { color: #4caf50; font-weight: 700; font-size: 16px; width: 50px; }
      .cell-inner { display: flex; align-items: center; gap: 8px; }
      .cell-value { flex: 1; word-break: break-all; overflow-wrap: break-word; }
      .masked { letter-spacing: 2px; color: #999; }
      .btn-copy-small {
        background: #fff; color: #4caf50; border: 1.5px solid #4caf50;
        border-radius: 5px; padding: 3px 12px; font-size: 12px;
        cursor: pointer; white-space: nowrap; transition: all 0.15s; font-weight: 500;
      }
      .btn-copy-small:hover { background: #4caf50; color: #fff; }
      .btn-copy-small.copied { background: #4caf50; color: #fff; }
      .btn-copy-all {
        background: #4caf50; color: #fff; border: none; border-radius: 6px;
        padding: 7px 20px; font-size: 13px; cursor: pointer; font-weight: 600;
        white-space: nowrap; transition: background 0.15s;
      }
      .btn-copy-all:hover { background: #43a047; }
      .btn-copy-all.copied { background: #388e3c; }
      .toggle-pw { cursor: pointer; font-size: 13px; color: #aaa; user-select: none; }
      .toggle-pw:hover { color: #4caf50; }
    }

    /* ─── 移动端小屏：卡片布局 ─────────────── */
    @media (max-width: 767px) {
      .table-wrap { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <div class="header">
      <h1>🔐 账号分离一键复制工具</h1>
    </div>

    <!-- 查看模式横幅 -->
    <div class="view-mode-banner" id="viewModeBanner">
      📋 当前为分享链接查看模式，复制功能正常可用
    </div>

    <!-- 分享横幅 -->
    <div class="share-banner" id="shareBanner">
      <h3>🔗 生成可分享链接</h3>
      <p>将账号数据编码为链接，分享给朋友即可直接查看并复制</p>
      <input type="text" id="shareLinkInput" readonly placeholder="点击下方按钮生成分享链接..." />
      <button onclick="copyShareLink()">📋 复制分享链接</button>
    </div>

    <!-- 分享成功 -->
    <div class="share-success" id="shareSuccess">
      <span style="width:100%;font-weight:600">✅ 分享链接已生成并复制到剪贴板</span>
      <input type="text" id="shareLinkCopy" readonly />
      <button onclick="copyShareLink()">再次复制</button>
    </div>

    <!-- 输入区 -->
    <div class="input-section">
      <div class="sep-setting">
        <label>分隔符：</label>
        <input id="sepInput" value="----" placeholder="----" />
        <span class="hint">格式：账号[分隔符]密码[分隔符]邮箱，多个用竖线隔开</span>
      </div>
      <textarea id="rawInput" placeholder="粘贴账号数据，每行一条，示例：&#10;i3mk1f7@llt.lingeringp.com----1FLZzqyJRu----bs0gub8cu3@126.com&#10;kskg4h3@llt.lingeringp.com----aPI3MWOlkq----jfp983xiz0@126.com"></textarea>
      <div class="parse-btn-wrap">
        <button class="btn-parse" onclick="parseData()">✨ 解析数据</button>
        <button class="btn-share" id="btnShare" onclick="generateShareLink()">🔗 分享链接</button>
        <button class="btn-clear" onclick="clearAll()">清空</button>
      </div>
    </div>

    <!-- 账号列表 -->
    <div class="accounts-section">
      <!-- 统计栏 -->
      <div class="stats-bar">
        <span id="statsText">共 0 条账号</span>
        <div class="stats-right">
          <span class="used-count" id="usedCount">已使用 0 条</span>
          <button class="btn-reset-used" onclick="resetUsed()">重置标记</button>
          <button class="btn-show-all-pw" onclick="toggleAllPasswords()">显示/隐藏密码</button>
        </div>
      </div>

      <!-- 移动端卡片列表 -->
      <div id="cardList"></div>

      <!-- 桌面端表格 -->
      <div class="table-wrap">
        <table id="accountTable">
          <thead>
            <tr>
              <th>序号</th><th>账号</th><th>密码</th><th>邮箱</th>
              <th style="text-align:right">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" class="empty-tip">暂无数据，请在上方粘贴账号信息并点击「解析数据」</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 说明 -->
    <div class="share-info">
      💡 <strong>使用方法：</strong>粘贴账号 → 解析 → 点击「<strong>分享链接</strong>」→ 发送链接给朋友，他们打开即可一键复制！<br>
      🔒 <strong>隐私说明：</strong>标记数据仅保存在本设备/分享链接中，不会上传到任何服务器。
    </div>
  </div>

  <div id="toast">已复制！</div>

  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/lib/lz-string.min.js"></script>
  <script>
    let accounts = [];
    let showPasswords = {};
    let usedAccounts = {};   // 记录哪些账号已使用 {index: true}
    let allPwVisible = false;
    let isSharedView = false;
    let isCloudShare = false;  // 是否使用云端同步分享
    let currentBinId = null;   // JSONBin的bin ID
    let currentAccessKey = null; // JSONBin的access key
    let pollTimer = null;      // 轮询定时器

    // ─── 获取分享模式的唯一标识 ─────────────────────────────
    function getShareKey() {
      // 用URL路径作为localStorage的key，同一个分享链接共享标记
      return 'account_tool_used_' + window.location.pathname + '_' + window.location.hash.substring(1, 20);
    }

    // ─── JSONBin API 基础URL ────────────────────────────────
    const JSONBIN_API = 'https://api.jsonbin.io/v3';

    // ─── 创建云端分享（JSONBin）────────────────────────────
    async function createCloudShare() {
      const shareData = { accounts: accounts, usedAccounts: usedAccounts };
      try {
        const resp = await fetch(JSONBIN_API + '/b', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(shareData)
        });
        const result = await resp.json();
        if (result.metadata) {
          return {
            binId: result.metadata.id,
            accessKey: result.metadata.accessKey,
            success: true
          };
        }
        throw new Error('创建失败');
      } catch(e) {
        console.error('Cloud share error:', e);
        return { success: false, error: e.message };
      }
    }

    // ─── 读取云端数据 ──────────────────────────────────────
    async function readCloudData(binId) {
      try {
        const resp = await fetch(JSONBIN_API + '/b/' + binId + '/latest', {
          method: 'GET'
        });
        if (resp.status === 429) {
          // 速率限制
          handleRateLimit();
          return null;
        }
        const result = await resp.json();
        if (result.record) return result.record;
        if (result.accounts) return result;
        return null;
      } catch(e) {
        console.error('Read cloud error:', e);
        return null;
      }
    }

    // ─── 更新云端已使用状态 ────────────────────────────────
    async function updateCloudUsed() {
      if (!currentBinId || !currentAccessKey) return;
      try {
        const resp = await fetch(JSONBIN_API + '/b/' + currentBinId, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': currentAccessKey
          },
          body: JSON.stringify({ accounts: accounts, usedAccounts: usedAccounts })
        });
        if (resp.status === 429) {
          handleRateLimit();
        }
      } catch(e) {
        console.error('Update cloud error:', e);
      }
    }

    // ─── 开始轮询云端状态 ──────────────────────────────────
    let pollInterval = 10000; // 初始10秒
    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        const data = await readCloudData(currentBinId);
        if (data && data.usedAccounts) {
          const oldCount = Object.keys(usedAccounts).filter(k => usedAccounts[k]).length;
          usedAccounts = data.usedAccounts;
          const newCount = Object.keys(usedAccounts).filter(k => usedAccounts[k]).length;
          renderAll();
          // 如果有新的使用，显示提示
          if (newCount > oldCount && !isSharedView) {
            showToast('有 ' + (newCount - oldCount) + ' 条账号被使用了！');
          }
          // 成功获取数据，恢复较快轮询
          if (pollInterval > 10000) {
            pollInterval = 10000;
            startPolling();
          }
        }
      }, pollInterval);
    }
    
    // ─── 处理API速率限制 ─────────────────────────────────
    function handleRateLimit() {
      // 如果收到速率限制错误，增加轮询间隔
      pollInterval = Math.min(pollInterval * 2, 60000); // 最多60秒
      startPolling();
      showToast('同步延迟已调整至 ' + (pollInterval / 1000) + ' 秒');
    }

    // ─── 初始化 ──────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      const hash = window.location.hash;
      if (hash && hash.length > 1) {
        const hashContent = hash.substring(1);
        
        // 检查是否为云端分享链接（JSONBin格式：jb_<binId>_<accessKey>）
        if (hashContent.startsWith('jb_')) {
          const parts = hashContent.substring(3).split('_');
          if (parts.length >= 2) {
            currentBinId = parts[0];
            currentAccessKey = parts[1];
            isCloudShare = true;
            isSharedView = true;
            
            // 从云端读取数据
            const data = await readCloudData(currentBinId);
            if (data) {
              accounts = data.accounts || [];
              usedAccounts = data.usedAccounts || {};
              
              // 界面调整为查看模式
              document.getElementById('viewModeBanner').innerHTML = '☁️ 云端同步模式，已使用状态实时同步中...';
              document.getElementById('viewModeBanner').classList.add('active');
              document.getElementById('shareBanner').style.display = 'none';
              document.getElementById('rawInput').style.display = 'none';
              document.querySelector('.sep-setting').style.display = 'none';
              document.querySelector('.hint').style.display = 'none';
              document.querySelector('.btn-parse').style.display = 'none';
              document.querySelector('.btn-clear').style.display = 'none';
              document.querySelector('.share-info').style.display = 'none';
              renderAll();
              
              // 开始轮询云端状态
              startPolling();
              showToast('已加载 ' + accounts.length + ' 条账号，实时同步中');
            } else {
              showToast('加载分享数据失败，请检查链接');
            }
            return;
          }
        }
        
        // 旧版：本地压缩/Base64链接
        try {
          let jsonStr = '';
          try {
            jsonStr = LZString.decompressFromEncodedURIComponent(hashContent);
          } catch(e) {}
          if (!jsonStr) {
            try {
              jsonStr = decodeURIComponent(atob(hashContent));
            } catch(e) {}
          }
          if (!jsonStr) return;
          const data = JSON.parse(jsonStr);
          accounts = data.accounts || data;
          usedAccounts = data.usedAccounts || {};
          const shareKey = getShareKey();
          const savedUsed = localStorage.getItem(shareKey);
          if (savedUsed) {
            try { usedAccounts = JSON.parse(savedUsed); } catch(e) {}
          }
          isSharedView = true;
          document.getElementById('viewModeBanner').classList.add('active');
          document.getElementById('shareBanner').style.display = 'none';
          document.getElementById('rawInput').style.display = 'none';
          document.querySelector('.sep-setting').style.display = 'none';
          document.querySelector('.hint').style.display = 'none';
          document.querySelector('.btn-parse').style.display = 'none';
          document.querySelector('.btn-clear').style.display = 'none';
          document.querySelector('.share-info').style.display = 'none';
          renderAll();
          showToast('已加载 ' + accounts.length + ' 条账号');
        } catch (e) {
          console.error('Load error:', e);
        }
      } else {
        // 正常模式：从localStorage加载
        const saved = localStorage.getItem('account_tool_data');
        if (saved) {
          try {
            const savedData = JSON.parse(saved);
            accounts = savedData.accounts || savedData;
            usedAccounts = savedData.usedAccounts || {};
            const savedRaw = localStorage.getItem('account_tool_raw');
            if (savedRaw) document.getElementById('rawInput').value = savedRaw;
            renderAll();
          } catch(e) {}
        }
      }
    });

    // ─── 解析数据 ────────────────────────────────────────────
    function parseData() {
      const raw = document.getElementById('rawInput').value.trim();
      if (!raw) { showToast('请先输入账号数据'); return; }

      const sepRaw = document.getElementById('sepInput').value || '----';
      const seps = sepRaw.split('|').map(s => s.trim()).filter(Boolean);
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const parsed = [];

      for (const line of lines) {
        let parts = null;
        for (const sep of seps) {
          if (line.includes(sep)) {
            const idx1 = line.indexOf(sep);
            const rest = line.substring(idx1 + sep.length);
            const idx2 = rest.indexOf(sep);
            if (idx2 !== -1) {
              parts = [line.substring(0, idx1).trim(), rest.substring(0, idx2).trim(), rest.substring(idx2 + sep.length).trim()];
            } else {
              parts = [line.substring(0, idx1).trim(), rest.trim(), ''];
            }
            break;
          }
        }
        if (parts) {
          parsed.push({ account: parts[0], password: parts[1], email: parts[2] });
        } else {
          const auto = autoSplit(line);
          if (auto) parsed.push(auto);
        }
      }

      if (parsed.length === 0) { showToast('未能识别有效账号，请检查分隔符'); return; }

      accounts = parsed;
      showPasswords = {};
      usedAccounts = {};
      saveToLocal();
      renderAll();
      document.getElementById('btnShare').classList.add('active');
      showToast('解析成功 ' + parsed.length + ' 条账号，可分享！');
    }

    function autoSplit(line) {
      const delimiters = ['----', '---', '--', '|', ':', '\t'];
      for (const d of delimiters) {
        if (line.includes(d)) {
          const parts = line.split(d).map(s => s.trim());
          if (parts.length >= 2) return { account: parts[0], password: parts[1], email: parts[2] || '' };
        }
      }
      return null;
    }

    // ─── 生成分享链接 ───────────────────────────────────────
    async function generateShareLink() {
      if (accounts.length === 0) { showToast('请先解析账号数据'); return; }
      
      showToast('正在创建云端分享...');
      
      // 创建云端分享
      const cloudResult = await createCloudShare();
      if (!cloudResult.success) {
        // 降级到本地压缩链接
        const shareData = { accounts: accounts };
        const jsonStr = JSON.stringify(shareData);
        let encoded = '';
        try {
          encoded = LZString.compressToEncodedURIComponent(jsonStr);
        } catch(e) {
          encoded = btoa(unescape(encodeURIComponent(jsonStr)));
        }
        const shareUrl = window.location.origin + window.location.pathname + '#' + encoded;
        document.getElementById('shareLinkInput').value = shareUrl;
        document.getElementById('shareLinkCopy').value = shareUrl;
        document.getElementById('shareBanner').classList.add('active');
        document.getElementById('shareSuccess').classList.add('active');
        copyShareLink();
        showToast('云端创建失败，已降级为本地链接');
        return;
      }
      
      // 云端分享成功
      currentBinId = cloudResult.binId;
      currentAccessKey = cloudResult.accessKey;
      isCloudShare = true;
      
      // 生成云端分享链接
      const shareUrl = window.location.origin + window.location.pathname + '#jb_' + cloudResult.binId + '_' + cloudResult.accessKey;
      document.getElementById('shareLinkInput').value = shareUrl;
      document.getElementById('shareLinkCopy').value = shareUrl;
      document.getElementById('shareBanner').classList.add('active');
      document.getElementById('shareSuccess').classList.add('active');
      
      // 显示压缩效果
      const urlLen = shareUrl.length;
      showToast('云端分享已创建！链接长度：' + urlLen + ' 字符');
      copyShareLink();
      
      // 如果是分享者自己查看，也开始轮询
      startPolling();
    }

    function copyShareLink() {
      const link = document.getElementById('shareLinkInput').value || document.getElementById('shareLinkCopy').value;
      if (!link) return;
      copyText(link, null, true);
    }

    // ─── 渲染（同时渲染卡片+表格） ───────────────────────────
    function renderAll() {
      document.getElementById('statsText').textContent = '共 ' + accounts.length + ' 条账号';

      // 更新已使用统计
      const usedCount = Object.keys(usedAccounts).filter(k => usedAccounts[k]).length;
      const usedCountEl = document.getElementById('usedCount');
      usedCountEl.textContent = '已使用 ' + usedCount + ' 条';
      if (usedCount > 0) {
        usedCountEl.classList.add('has-used');
      } else {
        usedCountEl.classList.remove('has-used');
      }

      if (accounts.length === 0) {
        document.getElementById('cardList').innerHTML = '<div class="empty-tip">暂无数据<br>请在上方粘贴账号信息</div>';
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty-tip">暂无数据，请在上方粘贴账号信息并点击「解析数据」</td></tr>';
        return;
      }

      // 渲染移动端卡片
      document.getElementById('cardList').innerHTML = accounts.map((item, i) => {
        const visible = showPasswords[i] || allPwVisible;
        const pwDisplay = visible ? escHtml(item.password) : '••••••••••';
        const eyeIcon = visible ? '🙈' : '👁';
        const isUsed = usedAccounts[i];
        const usedClass = isUsed ? ' used' : '';
        const usedBadge = isUsed ? '<span class="used-badge active">已使用</span>' : '<span class="used-badge">未使用</span>';
        return '<div class="account-card' + usedClass + '">' +
          '<div class="card-header">' +
            '<span class="card-num">' + (i + 1) + '</span>' +
            usedBadge +
            '<button class="btn-copy" onclick="copyText(\'' + escAttr(item.account) + '\', this, ' + i + ')">复制账号</button>' +
          '</div>' +
          '<div class="card-row">' +
            '<span class="card-label">账号</span>' +
            '<div class="card-value-wrap">' +
              '<span class="card-value">' + escHtml(item.account) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="card-row">' +
            '<span class="card-label">密码</span>' +
            '<div class="card-value-wrap">' +
              '<span class="card-value ' + (visible ? '' : 'masked') + '">' + pwDisplay + '</span>' +
              '<span class="toggle-pw" onclick="togglePassword(' + i + ')">' + eyeIcon + '</span>' +
              '<button class="btn-copy" onclick="copyText(\'' + escAttr(item.password) + '\', this, ' + i + ')">复制</button>' +
            '</div>' +
          '</div>' +
          (item.email ? '<div class="card-row">' +
            '<span class="card-label">邮箱</span>' +
            '<div class="card-value-wrap">' +
              '<span class="card-value">' + escHtml(item.email) + '</span>' +
              '<button class="btn-copy" onclick="copyText(\'' + escAttr(item.email) + '\', this, ' + i + ')">复制</button>' +
            '</div>' +
          '</div>' : '') +
          '<button class="btn-copy-all" onclick="copyAll(' + i + ', this)">📋 全部复制（账号----密码----邮箱）</button>' +
        '</div>';
      }).join('');

      // 渲染桌面端表格
      document.getElementById('tableBody').innerHTML = accounts.map((item, i) => {
        const visible = showPasswords[i] || allPwVisible;
        const pwDisplay = visible ? escHtml(item.password) : '••••••••••';
        const eyeIcon = visible ? '🙈' : '👁';
        return '<tr>' +
          '<td class="num">' + (i + 1) + '</td>' +
          '<td><div class="cell-inner"><span class="cell-value">' + escHtml(item.account) + '</span><button class="btn-copy-small" onclick="copyText(\'' + escAttr(item.account) + '\', this)">复制</button></div></td>' +
          '<td><div class="cell-inner"><span class="cell-value ' + (visible ? '' : 'masked') + '">' + pwDisplay + '</span><span class="toggle-pw" onclick="togglePassword(' + i + ')">' + eyeIcon + '</span><button class="btn-copy-small" onclick="copyText(\'' + escAttr(item.password) + '\', this)">复制</button></div></td>' +
          '<td><div class="cell-inner"><span class="cell-value">' + escHtml(item.email) + '</span>' + (item.email ? '<button class="btn-copy-small" onclick="copyText(\'' + escAttr(item.email) + '\', this)">复制</button>' : '') + '</div></td>' +
          '<td style="text-align:right"><button class="btn-copy-all" onclick="copyAll(' + i + ', this)">全复制</button></td>' +
        '</tr>';
      }).join('');
    }

    function togglePassword(idx) {
      showPasswords[idx] = !showPasswords[idx];
      renderAll();
    }

    function toggleAllPasswords() {
      allPwVisible = !allPwVisible;
      showPasswords = {};
      renderAll();
    }

    // ─── 复制 ───────────────────────────────────────────────
    function copyText(text, btn, accountIdx, isLink) {
      // 标记为已使用
      if (typeof accountIdx === 'number' && accountIdx >= 0) {
        usedAccounts[accountIdx] = true;
        saveToLocal();
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast(isLink ? '分享链接已复制！' : '已复制: ' + (text.length > 20 ? text.substring(0, 20) + '...' : text));
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '已复制✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
        }
        // 复制后更新UI
        setTimeout(() => renderAll(), 50);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast(isLink ? '分享链接已复制！' : '已复制！');
        setTimeout(() => renderAll(), 50);
      });
    }

    function copyAll(idx, btn) {
      const item = accounts[idx];
      const fullText = [item.account, item.password, item.email].filter(Boolean).join('----');
      usedAccounts[idx] = true;
      saveToLocal();
      copyText(fullText, null, idx, false);
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '已复制✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      }
    }

    function resetUsed() {
      if (Object.keys(usedAccounts).length === 0) {
        showToast('暂无已标记的账号'); return;
      }
      if (!confirm('确定要重置所有已使用标记吗？')) return;
      usedAccounts = {};
      if (isCloudShare) {
        // 云端模式：清除云端状态
        updateCloudUsed();
      } else if (isSharedView) {
        // 本地分享模式：清除localStorage
        localStorage.removeItem(getShareKey());
      }
      saveToLocal();
      renderAll();
      showToast('已重置所有标记');
    }

    // ─── 清空 ───────────────────────────────────────────────
    function clearAll() {
      if (accounts.length === 0 && !document.getElementById('rawInput').value) {
        showToast('已经是空的了'); return;
      }
      if (!confirm('确定要清空所有数据吗？')) return;
      accounts = []; showPasswords = {}; usedAccounts = {};
      document.getElementById('rawInput').value = '';
      document.getElementById('btnShare').classList.remove('active');
      document.getElementById('shareBanner').classList.remove('active');
      document.getElementById('shareSuccess').classList.remove('active');
      localStorage.removeItem('account_tool_data');
      localStorage.removeItem('account_tool_raw');
      renderAll();
      showToast('已清空');
    }

    function saveToLocal() {
      if (!isSharedView) {
        localStorage.setItem('account_tool_data', JSON.stringify({ accounts: accounts, usedAccounts: usedAccounts }));
        localStorage.setItem('account_tool_raw', document.getElementById('rawInput').value);
      } else if (isCloudShare) {
        // 云端分享模式：同步到云端
        updateCloudUsed();
      } else {
        // 本地分享模式：保存到localStorage
        localStorage.setItem(getShareKey(), JSON.stringify(usedAccounts));
      }
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      if (!str) return '';
      return str.replace(/'/g, "\\'").replace(/\\/g, '\\\\');
    }

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }
  </script>
</body>

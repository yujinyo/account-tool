<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号管理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .tab.active {
            background: white;
            color: #667eea;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        .toggle a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .toggle a:hover { text-decoration: underline; }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #060;
            border: 1px solid #cfc;
            display: block;
        }
        /* 账号列表样式 */
        .account-list {
            display: none;
            margin-top: 20px;
        }
        .account-list.active { display: block; }
        .account-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .account-item:hover {
            border-color: #667eea;
            transform: translateX(4px);
        }
        .account-item .name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .account-item .time {
            font-size: 12px;
            color: #999;
        }
        .account-item .accounts {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e8e8e8;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .copy-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        .copy-toast.show { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .num { font-size: 28px; font-weight: 700; }
        .stat-box .label { font-size: 12px; opacity: 0.9; }
        .add-btn {
            background: #f8f9fa;
            border: 2px dashed #ddd;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            color: #999;
            transition: all 0.2s;
        }
        .add-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .logout-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .logout-btn:hover { background: #eee; }
        .share-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .share-btn:hover { opacity: 0.9; }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #333;
        }
        .share-link {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            word-break: break-all;
            margin-bottom: 12px;
            border: 1px solid #e8e8e8;
        }
        .modal-close {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-close:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录注册区域 -->
        <div id="authSection">
            <div class="header">
                <h1>🔐 账号管理</h1>
                <p>安全存储，一键复制</p>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>
            <div class="card">
                <div id="msg" class="message"></div>
                <div id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button class="btn" onclick="doLogin()">登录</button>
                    <div class="toggle">没有账号？<a onclick="switchTab('register')">立即注册</a></div>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" placeholder="请输入用户名（4-20位）" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="请输入密码（至少16位）" autocomplete="new-password">
                    </div>
                    <button class="btn" onclick="doRegister()">注册</button>
                    <div class="toggle">已有账号？<a onclick="switchTab('login')">立即登录</a></div>
                </div>
            </div>
        </div>

        <!-- 账号列表区域 -->
        <div id="listSection" style="display:none;">
            <div class="header">
                <h1>📒 账号列表</h1>
                <p>点击账号可直接复制</p>
            </div>
            <div class="card">
                <button class="logout-btn" onclick="logout()">← 退出登录</button>
                <div class="stats">
                    <div class="stat-box">
                        <div class="num" id="totalCount">0</div>
                        <div class="label">账号总数</div>
                    </div>
                    <div class="stat-box">
                        <div class="num" id="groupCount">0</div>
                        <div class="label">分组数</div>
                    </div>
                </div>
                <div class="add-btn" onclick="showAddModal()">+ 添加新分组</div>
                <div id="accountList" class="account-list"></div>
            </div>
        </div>
    </div>

    <!-- 添加分组弹窗 -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>添加分组</h3>
            <div class="form-group">
                <label>分组名称（如：抖音账号、微信等）</label>
                <input type="text" id="groupName" placeholder="请输入分组名称">
            </div>
            <div class="form-group">
                <label>账号信息（每行一条）</label>
                <textarea id="accountsText" rows="6" placeholder="每行一条账号信息，格式：&#10;账号1&#10;账号2&#10;账号3" style="width:100%;padding:14px;border:2px solid #e8e8e8;border-radius:10px;font-size:16px;resize:vertical;outline:none;"></textarea>
            </div>
            <button class="btn" onclick="addGroup()">确认添加</button>
            <div style="height:12px;"></div>
            <button class="modal-close" onclick="closeAddModal()">取消</button>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h3>📤 分享数据</h3>
            <p style="color:#666;font-size:13px;margin-bottom:16px;">以下链接包含你的所有账号数据，复制后分享给对方即可。</p>
            <div class="share-link" id="shareLink"></div>
            <button class="share-btn" onclick="copyShareLink()">📋 复制链接</button>
            <button class="modal-close" onclick="closeShareModal()">关闭</button>
        </div>
    </div>

    <div id="copyToast" class="copy-toast">已复制到剪贴板 ✓</div>

    <script>
        // ============ 配置区域 ============
        // ⚠️ 如果你在本地测试，把 API_URL 改成你的 Vercel 地址
        const API_URL = 'https://account-tool-vgp3-7i62lav3v-yujinyos-projects.vercel.app';
        // ⚠️ 这是你的 JSONBin Key，用于分享功能（只读）
        const JSONBIN_KEY = '$2a$10$YcuC/l.PRLR9qXlvVmWae.HGMwNkhgxNDx/FNotNyyIip.ujfyujS';

        // ============ 状态管理 ============
        let currentUser = localStorage.getItem('username') || '';
        let currentPassword = localStorage.getItem('password') || '';

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            // Tab 切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });
            // 回车登录
            document.getElementById('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
            // 检查登录状态
            if (currentUser && currentPassword) {
                showList();
                loadAccounts();
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            hideMsg();
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(() => el.className = 'message', 4000);
        }
        function hideMsg() {
            document.getElementById('msg').className = 'message';
        }

        // ============ 注册 ============
        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!username || username.length < 4) return showMsg('用户名至少4位', 'error');
            if (password.length < 16) return showMsg('密码至少16位', 'error');
            try {
                const res = await fetch(`${API_URL}/api/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('username', username);
                    localStorage.setItem('password', password);
                    currentUser = username;
                    currentPassword = password;
                    showMsg('注册成功！', 'success');
                    setTimeout(() => { showList(); loadAccounts(); }, 1000);
                } else {
                    showMsg(data.error || '注册失败', 'error');
                }
            } catch (e) {
                showMsg('网络错误，请检查网络', 'error');
            }
        }

        // ============ 登录 ============
        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) return showMsg('请输入用户名和密码', 'error');
            try {
                const res = await fetch(`${API_URL}/api/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('username', username);
                    localStorage.setItem('password', password);
                    currentUser = username;
                    currentPassword = password;
                    showList();
                    loadAccounts();
                } else {
                    showMsg(data.error || '登录失败', 'error');
                }
            } catch (e) {
                showMsg('网络错误，请检查网络', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('password');
            currentUser = '';
            currentPassword = '';
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('listSection').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ============ 账号管理 ============
        function showList() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('listSection').style.display = 'block';
        }

        async function loadAccounts() {
            try {
                const res = await fetch(`${API_URL}/api/user/records`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, password: currentPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    renderList(data.records || []);
                } else if (res.status === 401) {
                    logout();
                    showMsg('登录已过期，请重新登录', 'error');
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderList(records) {
            document.getElementById('totalCount').textContent = records.reduce((s, r) => s + (r.accounts?.length || 0), 0);
            document.getElementById('groupCount').textContent = records.length;
            const container = document.getElementById('accountList');
            if (records.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:40px 0;">暂无数据，点击上方添加分组</div>';
                return;
            }
            container.innerHTML = records.map((r, i) => `
                <div class="account-item" onclick="event.stopPropagation();">
                    <div class="name" onclick="toggleGroup(${i})" style="cursor:pointer;">▶ ${r.groupName}</div>
                    <div class="time">${r.accounts.length} 个账号</div>
                    <div class="accounts" id="group-${i}" style="display:none;">
                        ${r.accounts.map(a => `<div onclick="copyText('${a.replace(/'/g, "\\'")}')" style="cursor:pointer;padding:6px 0;border-bottom:1px dashed #eee;">${a}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            container.classList.add('active');
        }

        function toggleGroup(i) {
            const el = document.getElementById(`group-${i}`);
            const nameEl = document.querySelector(`.account-item:nth-child(${i+1}) .name`);
            if (el.style.display === 'none') {
                el.style.display = 'block';
                nameEl.textContent = '▼ ' + nameEl.textContent.replace(/^[▶▼]\s*/, '');
            } else {
                el.style.display = 'none';
                nameEl.textContent = '▶ ' + nameEl.textContent.replace(/^[▶▼]\s*/, '');
            }
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('groupName').value = '';
            document.getElementById('accountsText').value = '';
        }
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        async function addGroup() {
            const groupName = document.getElementById('groupName').value.trim();
            const text = document.getElementById('accountsText').value.trim();
            if (!groupName) return alert('请输入分组名称');
            if (!text) return alert('请输入账号信息');
            const accounts = text.split('\n').map(s => s.trim()).filter(Boolean);
            if (accounts.length === 0) return alert('请输入至少一条账号信息');
            try {
                const res = await fetch(`${API_URL}/api/user/records`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, password: currentPassword, groupName, accounts })
                });
                const data = await res.json();
                if (res.ok) {
                    closeAddModal();
                    loadAccounts();
                } else {
                    alert(data.error || '添加失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        // ============ 复制 & 分享 ============
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copyToast');
                toast.textContent = `已复制: ${text.substring(0,20)}...`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function showShareModal() {
            const link = `${window.location.origin}/share.html?data=${btoa(JSON.stringify({ u: currentUser, p: currentPassword }))}`;
            document.getElementById('shareLink').textContent = link;
            document.getElementById('shareModal').classList.add('show');
        }
        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('show');
        }
        function copyShareLink() {
            const link = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.querySelector('.share-btn');
                btn.textContent = '✓ 已复制！';
                setTimeout(() => btn.textContent = '📋 复制链接', 2000);
            });
        }
    </script>
</body>
</html>

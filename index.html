<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号管理工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.85; font-size: 14px; }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .stat-box .num { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-box .label { font-size: 12px; color: #999; margin-top: 4px; }

        .add-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: white;
            border: 2px dashed #ccc;
            border-radius: 12px;
            text-align: center;
            color: #999;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .add-btn:hover { border-color: #667eea; color: #667eea; }

        .account-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .account-item:hover { border-color: #667eea; }
        .account-item .name { font-weight: 600; color: #333; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .account-item .time { font-size: 12px; color: #999; }
        .account-item .actions { display: flex; gap: 8px; margin-top: 10px; }
        .account-item .actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .account-item .actions .edit-btn { background: #f0f0f0; color: #666; }
        .account-item .actions .del-btn { background: #fee; color: #c00; }
        
        .account-item .detail {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .account-item .detail.show { display: block; }
        .account-item .detail-row {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px dashed #f0f0f0;
        }
        .account-item .detail-row:last-child { border-bottom: none; }
        .account-item .detail-row span { flex: 1; word-break: break-all; }
        .account-item .detail-row button {
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .empty { text-align: center; color: rgba(255,255,255,0.8); padding: 60px 0; font-size: 15px; line-height: 2; }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        textarea { min-height: 150px; }
        
        .btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns .btn { flex: 1; text-align: center; }

        /* 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>账号管理工具</h1>
        <p>本地存储 · 隐私安全</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="num" id="totalCount">0</div>
            <div class="label">账号总数</div>
        </div>
        <div class="stat-box">
            <div class="num" id="groupCount">0</div>
            <div class="label">分组数</div>
        </div>
    </div>

    <div class="add-btn" onclick="showAdd()">＋ 添加分组</div>
    <div id="accountList"></div>
</div>

<!-- 添加/编辑分组弹窗 -->
<div class="modal" id="addModal">
    <div class="modal-box">
        <h3 id="modalTitle">添加分组</h3>
        <div class="form-group">
            <label>分组名称</label>
            <input type="text" id="groupName" placeholder="如：抖音账号、微信等">
        </div>
        <div class="form-group">
            <label>账号信息（每行一条）</label>
            <textarea id="accountsText" placeholder="每行一条账号信息
格式：账号----密码----备注（选填）
例如：
user1----pass123----主号
user2----pass456"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn btn-cancel" onclick="closeAdd()">取消</button>
            <button class="btn" id="saveBtn" onclick="saveGroup()">确认添加</button>
        </div>
    </div>
</div>

<script>
// ============ 数据存储 ============
const STORAGE_KEY = 'accountGroups';
let editingIndex = null;

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', () => {
    renderList();
});

// ============ 渲染列表 ============
function getData() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
}

function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    renderList();
}

function renderList() {
    const records = getData();
    const totalCount = records.reduce((s, r) => s + (r.accounts?.length || 0), 0);
    document.getElementById('totalCount').textContent = totalCount;
    document.getElementById('groupCount').textContent = records.length;

    const container = document.getElementById('accountList');
    if (records.length === 0) {
        container.innerHTML = '<div class="empty">暂无数据<br>点击上方「＋ 添加分组」开始</div>';
        return;
    }
    
    container.innerHTML = records.map((r, i) => `
        <div class="account-item">
            <div class="name" onclick="toggleGroup(${i})">
                <span id="arrow${i}">▶</span> ${escapeHtml(r.groupName)}
            </div>
            <div class="time">${r.accounts.length} 条</div>
            <div class="actions">
                <button class="edit-btn" onclick="editGroup(${i})">编辑</button>
                <button class="del-btn" onclick="deleteGroup(${i})">删除</button>
            </div>
            <div class="detail" id="detail${i}">
                ${r.accounts.map((a, ai) => {
                    const parts = a.split('----');
                    const account = parts[0] || '';
                    const password = parts[1] || '';
                    const note = parts[2] || '';
                    return `
                    <div class="detail-row">
                        <span>${escapeHtml(account)}</span>
                        <button onclick="copyText('${escapeHtml(account)}')">复制账号</button>
                    </div>
                    <div class="detail-row">
                        <span>${'*'.repeat(8)}</span>
                        <button onclick="copyText('${escapeHtml(password)}')">复制密码</button>
                    </div>
                    ${note ? `<div class="detail-row"><span>备注: ${escapeHtml(note)}</span></div>` : ''}
                    <div style="height:8px"></div>
                    `;
                }).join('')}
            </div>
        </div>
    `).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleGroup(i) {
    const detail = document.getElementById(`detail${i}`);
    const arrow = document.getElementById(`arrow${i}`);
    if (detail.classList.contains('show')) {
        detail.classList.remove('show');
        arrow.textContent = '▶';
    } else {
        detail.classList.add('show');
        arrow.textContent = '▼';
    }
}

// ============ 添加/编辑分组 ============
function showAdd() {
    editingIndex = null;
    document.getElementById('modalTitle').textContent = '添加分组';
    document.getElementById('saveBtn').textContent = '确认添加';
    document.getElementById('groupName').value = '';
    document.getElementById('accountsText').value = '';
    document.getElementById('addModal').classList.add('show');
}

function editGroup(index) {
    const records = getData();
    const group = records[index];
    editingIndex = index;
    document.getElementById('modalTitle').textContent = '编辑分组';
    document.getElementById('saveBtn').textContent = '保存修改';
    document.getElementById('groupName').value = group.groupName;
    document.getElementById('accountsText').value = group.accounts.join('\n');
    document.getElementById('addModal').classList.add('show');
}

function closeAdd() {
    document.getElementById('addModal').classList.remove('show');
}

function saveGroup() {
    const groupName = document.getElementById('groupName').value.trim();
    const text = document.getElementById('accountsText').value.trim();
    
    if (!groupName) {
        alert('请输入分组名称');
        return;
    }
    
    const accounts = text.split('\n').map(s => s.trim()).filter(Boolean);
    
    const records = getData();
    
    if (editingIndex !== null) {
        // 编辑模式
        records[editingIndex] = { groupName, accounts };
    } else {
        // 添加模式
        records.unshift({ groupName, accounts });
    }
    
    saveData(records);
    closeAdd();
    showToast('保存成功');
}

function deleteGroup(index) {
    if (!confirm('确定要删除这个分组吗？')) return;
    const records = getData();
    records.splice(index, 1);
    saveData(records);
    showToast('已删除');
}

// 点击弹窗背景关闭
document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeAdd();
});

// ============ 复制功能 ============
function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
    }).catch(() => {
        showToast('复制失败');
    });
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号分离一键复制工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* 顶部标题 */
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 20px; }
        .header span { font-size: 28px; }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        /* 输入区域 */
        .separator-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }
        .separator-row label {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
        }
        .separator-row input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .separator-row input:focus { border-color: #10b981; }
        
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Consolas', monospace;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        textarea:focus { border-color: #10b981; }
        
        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .btn-secondary:hover { background: #eee; }
        
        /* 统计信息 */
        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 14px;
        }
        .stat-item .label { color: #666; }
        .stat-item .value { font-weight: 600; color: #10b981; }
        
        /* 表格 */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #333;
        }
        tr:hover { background: #f9fafb; }
        .seq { color: #999; width: 50px; }
        .account { font-family: 'Consolas', monospace; word-break: break-all; }
        .password { font-family: 'Consolas', monospace; }
        .password.hidden { color: #ccc; }
        .email { color: #666; font-size: 13px; word-break: break-all; }
        .action { width: 100px; }
        .action button {
            padding: 6px 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .action button:hover { opacity: 0.8; }
        .used-tag {
            font-size: 11px;
            padding: 2px 6px;
            background: #fee;
            color: #c00;
            border-radius: 4px;
            margin-left: 8px;
        }
        .reset-btn {
            padding: 6px 12px;
            background: #fee;
            color: #c00;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 8px;
        }
        .reset-btn:hover { background: #fdd; }
        
        /* 密码显示/隐藏 */
        .toggle-pwd {
            padding: 4px 8px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* 提示 */
        .tips {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            color: #065f46;
            line-height: 1.8;
        }
        .tips h3 {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .tips li { margin-bottom: 4px; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
        }
        
        .empty { text-align: center; color: #ccc; padding: 40px; font-size: 15px; }
    </style>
</head>
<body>
<div class="container">
    <!-- 标题 -->
    <div class="header">
        <span>🔐</span>
        <h1>账号分离一键复制工具</h1>
    </div>
    
    <!-- 输入区 -->
    <div class="card">
        <div class="separator-row">
            <label>分隔符设置：</label>
            <input type="text" id="separator" value="----" placeholder="默认 ----，支持多个分隔符用竖线隔开，如: ----|--">
        </div>
        <textarea id="inputData" placeholder="粘贴账号数据，每行一条

格式示例：
账号----密码----邮箱（可选）
账号----密码
账号

例如：
zhangsan@email.com----pass123----主号
lisi@email.com----pass456"></textarea>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="parseData()">🔍 解析数据</button>
            <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>
    </div>
    
    <!-- 统计 -->
    <div class="card">
        <div class="stats">
            <div class="stat-item">
                <span class="label">共</span>
                <span class="value" id="totalCount">0</span>
                <span class="label">条账号</span>
            </div>
            <div class="stat-item">
                <span class="label">已使用</span>
                <span class="value" id="usedCount">0</span>
                <span class="label">条</span>
            </div>
            <div class="stat-item">
                <button class="reset-btn" onclick="resetAll()">重置已使用</button>
            </div>
            <div class="stat-item">
                <button class="toggle-pwd" onclick="toggleAllPwd()">🔒 显示/隐藏密码</button>
            </div>
        </div>
    </div>
    
    <!-- 结果表格 -->
    <div class="card">
        <div class="card-title">📋 账号列表（点击「复制」获取下一条）</div>
        <div class="table-wrap" id="resultArea">
            <div class="empty">粘贴数据并点击「解析数据」开始</div>
        </div>
    </div>
    
    <!-- 使用说明 -->
    <div class="card tips">
        <h3>📖 使用说明</h3>
        <ul>
            <li>在输入框粘贴账号数据，每行一条</li>
            <li>支持多种格式：<code>账号----密码</code> 或 <code>账号----密码----邮箱</code></li>
            <li>点击账号行右侧的「复制」按钮，会自动复制并标记为已使用</li>
            <li>使用后系统自动跳过已使用的账号，方便批量分配</li>
            <li>「重置已使用」可以清空所有已使用标记</li>
            <li>数据保存在浏览器本地，刷新不丢失</li>
        </ul>
        <p style="margin-top:12px;padding-top:12px;border-top:1px solid #a7f3d0;">
            🔒 <strong>隐私说明</strong>：所有数据仅保存在您本地浏览器，不会上传到任何服务器
        </p>
    </div>
</div>

<script>
// ============ 配置 ============
const STORAGE_KEY = 'accountParserData';
const USED_KEY = 'accountParserUsed';

// ============ 初始化 ============
let accounts = [];
let usedAccounts = {};
let showAllPwd = false;

document.addEventListener('DOMContentLoaded', () => {
    // 恢复分隔符
    const savedSep = localStorage.getItem('accountParserSep');
    if (savedSep) document.getElementById('separator').value = savedSep;
    
    // 恢复已使用状态
    const savedUsed = localStorage.getItem(USED_KEY);
    if (savedUsed) usedAccounts = JSON.parse(savedUsed);
    
    renderStats();
});

// ============ 解析数据 ============
function parseData() {
    const separator = document.getElementById('separator').value.trim() || '----';
    const input = document.getElementById('inputData').value.trim();
    
    if (!input) {
        showToast('请粘贴账号数据');
        return;
    }
    
    // 保存分隔符
    localStorage.setItem('accountParserSep', separator);
    
    // 解析每行
    const lines = input.split('\n').filter(l => l.trim());
    accounts = lines.map((line, index) => {
        // 尝试多种分隔符
        let parts;
        if (separator.includes('|')) {
            // 多分隔符
            const seps = separator.split('|');
            let remaining = line;
            for (const sep of seps) {
                if (remaining.includes(sep)) {
                    parts = remaining.split(sep);
                    break;
                }
            }
            if (!parts) parts = [remaining];
        } else {
            parts = line.split(separator);
        }
        
        return {
            id: index,
            account: (parts[0] || '').trim(),
            password: (parts[1] || '').trim(),
            email: (parts[2] || '').trim()
        };
    }).filter(a => a.account);
    
    renderTable();
    renderStats();
    showToast(`成功解析 ${accounts.length} 条账号`);
}

// ============ 渲染表格 ============
function renderTable() {
    const container = document.getElementById('resultArea');
    
    if (accounts.length === 0) {
        container.innerHTML = '<div class="empty">粘贴数据并点击「解析数据」开始</div>';
        return;
    }
    
    // 过滤掉已使用的账号，找到第一个未使用的
    const unusedAccounts = accounts.filter(a => !usedAccounts[a.id]);
    
    let html = `<table>
        <thead>
            <tr>
                <th class="seq">序号</th>
                <th>账号</th>
                <th>密码</th>
                <th>邮箱</th>
                <th class="action">操作</th>
            </tr>
        </thead>
        <tbody>`;
    
    accounts.forEach((a, i) => {
        const isUsed = usedAccounts[a.id];
        const isFirst = !isUsed && unusedAccounts.length > 0 && a.id === unusedAccounts[0].id;
        const pwdDisplay = showAllPwd || isFirst ? escapeHtml(a.password) : '••••••••';
        
        html += `<tr style="${isUsed ? 'opacity:0.5' : isFirst ? 'background:#ecfdf5' : ''}">
            <td class="seq">${i + 1}</td>
            <td class="account">${escapeHtml(a.account)}${isUsed ? '<span class="used-tag">已用</span>' : ''}</td>
            <td class="password">${pwdDisplay}</td>
            <td class="email">${escapeHtml(a.email || '-')}</td>
            <td class="action">
                ${isUsed ? 
                    '<button disabled style="background:#ccc">已复制</button>' : 
                    `<button onclick="copyAndMark(${a.id})">${isFirst ? '✨ 复制' : '复制'}</button>`
                }
            </td>
        </tr>`;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

// ============ 复制并标记 ============
function copyAndMark(id) {
    const account = accounts.find(a => a.id === id);
    if (!account) return;
    
    const text = account.password || account.account;
    navigator.clipboard.writeText(text).then(() => {
        usedAccounts[id] = true;
        localStorage.setItem(USED_KEY, JSON.stringify(usedAccounts));
        renderTable();
        renderStats();
        showToast('已复制：' + text);
    }).catch(() => {
        showToast('复制失败，请手动复制');
    });
}

// ============ 统计 ============
function renderStats() {
    document.getElementById('totalCount').textContent = accounts.length;
    const usedCount = Object.keys(usedAccounts).filter(id => usedAccounts[id] && accounts.find(a => a.id == id)).length;
    document.getElementById('usedCount').textContent = usedCount;
}

// ============ 功能按钮 ============
function clearAll() {
    if (!confirm('确定要清空所有数据吗？')) return;
    document.getElementById('inputData').value = '';
    accounts = [];
    usedAccounts = {};
    localStorage.removeItem(USED_KEY);
    renderTable();
    renderStats();
    showToast('已清空');
}

function resetAll() {
    if (!confirm('确定要重置所有已使用标记吗？')) return;
    usedAccounts = {};
    localStorage.removeItem(USED_KEY);
    renderTable();
    renderStats();
    showToast('已重置');
}

function toggleAllPwd() {
    showAllPwd = !showAllPwd;
    renderTable();
}

// ============ 工具函数 ============
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}
</script>
</body>
</html>
